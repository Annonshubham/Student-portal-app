{% load static %}

<!DOCTYPE html>

<html>
    <head>
        <title>Student Portal</title>
        <link rel="stylesheet" href="{%static 'css/style.css'%}">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>

    <body>
        <header class="navbar">
            <div class="logo">📚 Student Portal</div>
            <nav class="nav-menu">
                <a href="/" class="nav-link">Home</a>
                <a href="/students/" class="nav-link">Students</a>
                <a href="/dashboard/" class="nav-link">Dashboard</a>
                <a href="/cgpa/" class="nav-link">CGPA</a>
                <a href="/grades/" class="nav-link">Grades</a>
                <a href="/attendance/" class="nav-link">Attendance</a>
                <a href="/statistics/" class="nav-link">Statistics</a>
            </nav>
        </header>

        <div class="container">
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
            
            {% block content %}
            {% endblock %}
        </div>

        <footer class="footer">
            <p>&copy; 2026 Student Management Portal | All Rights Reserved</p>
        </footer>
    </body>
</html>
